<!-- Template Variables

title: The title of the article
preferred_link: The best link to associate with the article for linking out.

external_link_label: A localized label for the external link.
external_link_stripped: The external link minus the scheme. Useful for displaying the external link.
external_link: The external link of the article if there is one provided by the author.

feed_link_title: The name of the feed associated with this article.
feed_link: The URL of the feed associated with this article.
byline: HTML that combines all the authors and links to them if available.
avatar_src: The image source URL for the feed icon / avatar.
dateline_style: Either "articleDateline" or "articleDatelineTitle" depending on if the title was populated or not.

datetime_long: Long version of a combined publish date and time.
datetime_medium: Medium length version of a combined publish date and time.
datetime_short: Short version of a combined publish date and time.

date_long: Long version of the publish date.
date_medium: Medium version of the publish date.
date_short: Long version of the publish date.

time_long: Long version of the publish time.
time_medium: Medium version of the publish time.
time_short: Long version of the publish time.

text_size_class: The size class that the user has selected in Preferences for article text.
body: The body of the article.

-->

<div class="blog-bar">
    <div class="blog-identity">
        <img class="blog-avatar" id="nnwImageIcon" src="[[avatar_src]]" height=48 width=48 />
        <div class="blog-text">
            <div class="feedLink blog-title"><a href="[[feed_link]]">[[feed_link_title]]</a></div>
            <div class="byline blog-slogan">[[byline]]</div>
        </div>
    </div>
</div>

<article class="flow">
    <div class="articleTitle post-title flow">
        <h1><a href="[[preferred_link]]">[[title]]</a></h1>
    </div>
    <div id="bodyContainer" class="articleBody flow [[text_size_class]]">[[body]]</div>
    <div id="footer" class="footer flow">
        <div class="meta flow">
            <div class="[[dateline_style]]"><a href="[[preferred_link]]">[[datetime_medium]]</a></div>
            <div class="externalLink"><a href="[[external_link]]">[[external_link]]</a></div>
        </div>
    </div>
    <script type="text/javascript">
        (function () {
            const APP_LINK_LABEL = "Open in X.app";
            const APP_URL_PREFIX = "x://?videoURL=";
            const PROCESSED_ATTRIBUTE = "data-youtube-enhanced";

            function isYouTubeHostname(hostname) {
                return hostname === "youtube.com" || hostname === "www.youtube.com";
            }

            function isValidVideoId(videoId) {
                return /^[A-Za-z0-9_-]{6,}$/.test(videoId);
            }

            function getVideoInfo(urlString) {
                let url;

                try {
                    url = new URL(urlString);
                } catch {
                    return null;
                }

                if (!isYouTubeHostname(url.hostname)) {
                    return null;
                }

                if (url.pathname === "/watch") {
                    const videoId = url.searchParams.get("v");

                    if (!isValidVideoId(videoId || "")) {
                        return null;
                    }

                    return {
                        videoId,
                        canonicalUrl: `https://www.youtube.com/watch?v=${videoId}`,
                        embedUrl: `https://www.youtube.com/embed/${videoId}`,
                    };
                }

                if (url.pathname.startsWith("/shorts/")) {
                    const pathParts = url.pathname.split("/").filter(Boolean);
                    const videoId = pathParts[1] || "";

                    if (!isValidVideoId(videoId)) {
                        return null;
                    }

                    return {
                        videoId,
                        canonicalUrl: `https://www.youtube.com/watch?v=${videoId}`,
                        embedUrl: `https://www.youtube.com/embed/${videoId}`,
                    };
                }

                return null;
            }

            function getInsertionTarget(anchor) {
                return anchor.closest("p, figure, div, li, blockquote") || anchor;
            }

            function createEmbedBlock(videoInfo, anchorText) {
                const wrapper = document.createElement("div");
                wrapper.className = "nnw-youtube-embed";

                const frame = document.createElement("div");
                frame.className = "nnw-youtube-frame";

                const iframe = document.createElement("iframe");
                iframe.className = "nnw-youtube-iframe";
                iframe.src = `${videoInfo.embedUrl}?rel=0`;
                iframe.title = anchorText || "Embedded YouTube video";
                iframe.loading = "lazy";
                iframe.allow =
                    "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
                iframe.referrerPolicy = "strict-origin-when-cross-origin";
                iframe.allowFullscreen = true;

                frame.appendChild(iframe);

                const actions = document.createElement("div");
                actions.className = "nnw-youtube-actions";

                const appLink = document.createElement("a");
                appLink.className = "nnw-youtube-app-link";
                appLink.href = `${APP_URL_PREFIX}${encodeURIComponent(videoInfo.canonicalUrl)}`;
                appLink.textContent = APP_LINK_LABEL;

                actions.appendChild(appLink);

                wrapper.appendChild(frame);
                wrapper.appendChild(actions);

                return wrapper;
            }

            function getBodyVideoAnchors() {
                const bodyContainer = document.querySelector("#bodyContainer");

                if (!bodyContainer) {
                    return [];
                }

                return Array.from(bodyContainer.querySelectorAll("a[href]")).filter(
                    (anchor) => getVideoInfo(anchor.getAttribute("href") || ""),
                );
            }

            function getTitleVideoAnchor() {
                const titleAnchor = document.querySelector(".articleTitle a[href]");

                if (!titleAnchor) {
                    return null;
                }

                return getVideoInfo(titleAnchor.getAttribute("href") || "")
                    ? titleAnchor
                    : null;
            }

            function getCandidateAnchors() {
                const bodyVideoAnchors = getBodyVideoAnchors();

                if (bodyVideoAnchors.length > 0) {
                    return bodyVideoAnchors;
                }

                const titleVideoAnchor = getTitleVideoAnchor();

                return titleVideoAnchor ? [titleVideoAnchor] : [];
            }

            function rewriteYouTubeLinks() {
                const anchors = getCandidateAnchors();

                anchors.forEach((anchor) => {
                    if (anchor.hasAttribute(PROCESSED_ATTRIBUTE)) {
                        return;
                    }

                    const href = anchor.getAttribute("href");
                    const videoInfo = getVideoInfo(href || "");

                    if (!videoInfo) {
                        return;
                    }

                    const insertionTarget = getInsertionTarget(anchor);

                    if (
                        !insertionTarget ||
                        insertionTarget.nextElementSibling?.classList.contains(
                            "nnw-youtube-embed",
                        )
                    ) {
                        anchor.setAttribute(PROCESSED_ATTRIBUTE, "true");
                        return;
                    }

                    const embedBlock = createEmbedBlock(
                        videoInfo,
                        anchor.textContent.trim(),
                    );
                    insertionTarget.insertAdjacentElement("afterend", embedBlock);
                    anchor.setAttribute(PROCESSED_ATTRIBUTE, "true");
                });
            }

            if (document.readyState === "loading") {
                document.addEventListener("DOMContentLoaded", rewriteYouTubeLinks);
            } else {
                rewriteYouTubeLinks();
            }
        })();
    </script>
</article>
