name: Release Theme

permissions:
    contents: write

on:
    push:
        paths:
            - "package.json"
        branches:
            - main

jobs:
    build-and-release:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: Prepare variables and zip
              id: prepare
              shell: bash
              run: |
                  VERSION=$(jq -r .version package.json)
                  chmod +x scripts/build-release-artifacts.sh
                  scripts/build-release-artifacts.sh "$VERSION" "$GITHUB_REPOSITORY"

                  echo "version=$VERSION" >> $GITHUB_OUTPUT
                  echo "body_path=dist/release_body.md" >> $GITHUB_OUTPUT

            - name: Create GitHub Release
              uses: softprops/action-gh-release@v3
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  tag_name: v${{ steps.prepare.outputs.version }}
                  name: Release v${{ steps.prepare.outputs.version }}
                  body_path: ${{ steps.prepare.outputs.body_path }}
                  files: dist/*.zip
