name: Release Theme

permissions:
  contents: write

on:
  push:
    paths:
      - "package.json"
    branches:
      - main

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get version from package.json
        id: get_version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Zip src directory
        run: |
          mkdir -p dist
          zip -r dist/thechelsuk.nnwtheme_latest.zip src

      - name: Create NetNewsWire theme install link
        id: nww_link
        run: |
          ZIP_NAME=thechelsuk.nnwtheme_latest.zip
          ZIP_URL="https://github.com/thechelsuk/uk.thechels.themes.nnw/releases/latest/download/$ZIP_NAME"
          NWW_LINK="netnewswire://theme/add?url=$ZIP_URL"
          echo "nww_link=$NWW_LINK" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          body: |
            ## thechelsuk
            Based on the light and alt themes of my website, adjusted to match the light and darkness of the app. Theme uses thechelsuk font included in the theme file as well as adapting to the device light/dark mode preference.
            ## Install this theme in NetNewsWire
            Download the `thechelsuk.nnwtheme_latest.zip` file and add it manually in NetNewsWire.
          files: dist/thechelsuk.nnwtheme_latest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}